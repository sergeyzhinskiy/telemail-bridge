# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: telemail
      POSTGRES_USER: telemail
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  bot:
    build: .
    command: python bot/main.py
    depends_on:
      - postgres
      - redis
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=postgresql://telemail:${DB_PASSWORD}@postgres/telemail
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./sessions:/app/sessions  # Для Telethon сессий

  admin:
    build: .
    command: uvicorn admin.web_app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://telemail:${DB_PASSWORD}@postgres/telemail

  celery_worker:
    build: .
    command: celery -A core.tasks worker --loglevel=info
    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - admin

volumes:
  postgres_data: